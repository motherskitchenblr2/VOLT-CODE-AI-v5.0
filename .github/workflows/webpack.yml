name: Node.js CI (Vite Build & Test)

on:
  push:
    branches: [ "main", "feature/v5-agentic-upgrade" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build production package
      run: npm run build

    - name: Run unit assertions tests
      run: npm run test
